<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link rel="shortcut icon" href="/assets/images/logo.png">
  <title>Forgot Password - Batrus Trades</title>

  <!-- Fonts -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap">

  <!-- Auth CSS (shared with login/signup) -->
  <link rel="stylesheet" href="/assets/css/signup.css">

  <style>
    .toast-box {
      position: fixed;
      top: 28px;
      right: 28px;
      padding: 13px 22px;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      font-family: 'Nunito', sans-serif;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      opacity: 0;
      transform: translateY(-10px);
      transition: opacity 0.35s ease, transform 0.35s ease;
      z-index: 99999;
      pointer-events: none;
      max-width: 320px;
    }

    .toast-box.show {
      opacity: 1;
      transform: translateY(0);
    }

    .verify-subtitle {
      color: #8094ae;
      text-align: center;
      font-size: 0.9rem;
      line-height: 1.6;
      margin-bottom: 20px;
    }
  </style>

  <!-- Smartsupp Live Chat -->
  <script type="text/javascript">
    var _smartsupp = _smartsupp || {};
    _smartsupp.key = '68e6e25569ef0795c2d91fe03171d7ba7624e9d9';
    window.smartsupp||(function(d) {
      var s,c,o=smartsupp=function(){ o._.push(arguments)};o._=[];
      s=d.getElementsByTagName('script')[0];c=d.createElement('script');
      c.type='text/javascript';c.charset='utf-8';c.async=true;
      c.src='https://www.smartsuppchat.com/loader.js?';s.parentNode.insertBefore(c,s);
    })(document);
  </script>
  <noscript>Powered by <a href="https://www.smartsupp.com" target="_blank">Smartsupp</a></noscript>
</head>

<body class="nk-body body-wider bg-light-alt">

  <!-- Toast -->
  <div class="toast-box" id="toast"></div>

  <div class="nk-wrap">
    <main class="nk-pages">
      <div class="section">
        <div class="container">
          <div class="nk-blocks d-flex justify-content-center">

            <div class="ath-container m-0">
              <div class="ath-body">

                <!-- Logo -->
                <center>
                  <a href="/" class="text-center mb-3">
                    <img src="/assets/images/logo.png" style="height:50px" />
                  </a>
                </center>

                <!-- Title -->
                <h5 class="ath-heading title">Forgot Password</h5>

                <p class="verify-subtitle">
                  Enter your email address and we'll send you a reset code.
                </p>

                <div class="field-item">
                  <div class="field-wrap">
                    <input
                      type="email"
                      id="emailInput"
                      class="input-bordered"
                      placeholder="Your email address"
                      required
                    >
                  </div>
                </div>

                <button id="sendBtn" class="btn btn-secondary btn-block btn-md">
                  Send Reset Code
                </button>

                <div class="ath-note text-center">
                  Remember your password?
                  <a href="/auth/login.html"><strong>Sign in here</strong></a>
                </div>

              </div>
            </div>

          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- jQuery -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>

  <script>
    const toast      = document.getElementById('toast');
    const sendBtn    = document.getElementById('sendBtn');
    const emailInput = document.getElementById('emailInput');

    // ── Toast ──
    let toastTimeout;
    function showToast(message, success = true) {
      clearTimeout(toastTimeout);
      toast.textContent = message;
      toast.style.background = success ? '#1ee0ac' : '#e74c3c';
      toast.style.color = success ? '#1c2b46' : '#fff';
      toast.classList.add('show');
      toastTimeout = setTimeout(() => toast.classList.remove('show'), 3500);
    }

    // ── Submit on Enter key ──
    emailInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendBtn.click();
    });

    // ── Send reset code ──
    sendBtn.addEventListener('click', async () => {
      const email = emailInput.value.trim();

      if (!email) {
        showToast('⚠️ Please enter your email.', false);
        emailInput.focus();
        return;
      }

      sendBtn.disabled = true;
      sendBtn.textContent = 'Sending...';

      try {
        const res = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await res.json();

        if (data.success) {
          showToast('✅ ' + data.message, true);
          setTimeout(() => {
            window.location.href = `/auth/reset-password.html?email=${encodeURIComponent(email)}`;
          }, 2000);
        } else {
          showToast('⚠️ ' + data.message, false);
          sendBtn.disabled = false;
          sendBtn.textContent = 'Send Reset Code';
        }
      } catch {
        showToast('⚠️ Network error. Try again.', false);
        sendBtn.disabled = false;
        sendBtn.textContent = 'Send Reset Code';
      }
    });
  </script>

</body>
</html>
