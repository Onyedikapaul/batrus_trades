<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link rel="shortcut icon" href="/assets/images/logo.png">
  <title>Reset Password - Batrus Trades</title>

  <!-- Fonts -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap">

  <!-- Auth CSS (shared with login/signup) -->
  <link rel="stylesheet" href="/assets/css/signup.css">

  <style>
    /* ---- OTP Inputs ---- */
    .code-inputs {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin: 16px 0 20px;
    }

    .code-input {
      width: 52px;
      height: 58px;
      text-align: center;
      font-size: 1.5rem;
      font-weight: 700;
      font-family: 'Nunito', sans-serif;
      color: #1c2b46;
      border: 1.5px solid #dbdfea;
      border-radius: 6px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: #fff;
    }

    .code-input:focus {
      border-color: #1ee0ac;
      box-shadow: 0 0 0 3px rgba(30, 224, 172, 0.15);
    }

    .code-input.filled {
      border-color: #1ee0ac;
    }

    /* ---- Section label ---- */
    .section-label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #8094ae;
      margin-bottom: 10px;
    }

    /* ---- Divider ---- */
    .divider {
      height: 1px;
      background: #dbdfea;
      margin: 20px 0;
    }

    /* ---- Email hint ---- */
    .email-hint {
      text-align: center;
      font-size: 0.85rem;
      color: #2c4a8f;
      font-weight: 600;
      margin-bottom: 16px;
    }

    /* ---- Show password ---- */
    .show-password-wrap {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin-top: 0.4rem;
      margin-bottom: 0.6rem;
    }

    .show-password-wrap input[type="checkbox"] {
      width: 15px;
      height: 15px;
      accent-color: #1ee0ac;
      cursor: pointer;
    }

    .show-password-wrap label {
      font-size: 0.8rem;
      color: #8094ae;
      cursor: pointer;
      user-select: none;
    }

    /* ---- Resend row ---- */
    .resend-row {
      margin-top: 1.25rem;
      font-size: 0.875rem;
      color: #8094ae;
      text-align: center;
    }

    .resend-link {
      color: #559bfb;
      font-weight: 600;
      background: none;
      border: none;
      font-size: inherit;
      font-family: inherit;
      cursor: pointer;
      padding: 0;
      transition: color 0.2s;
    }

    .resend-link:hover:not(:disabled) { color: #17c99b; }
    .resend-link:disabled { color: #8094ae; cursor: not-allowed; }

    .resend-timer {
      color: #8094ae;
      font-size: 0.82rem;
      margin-left: 4px;
    }

    /* ---- Toast ---- */
    .toast-box {
      position: fixed;
      top: 28px;
      right: 28px;
      padding: 13px 22px;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      font-family: 'Nunito', sans-serif;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      opacity: 0;
      transform: translateY(-10px);
      transition: opacity 0.35s ease, transform 0.35s ease;
      z-index: 99999;
      pointer-events: none;
      max-width: 320px;
    }

    .toast-box.show {
      opacity: 1;
      transform: translateY(0);
    }
  </style>

  <!-- Smartsupp Live Chat -->

    var _smartsupp = _smartsupp || {};

</head>

<body class="nk-body body-wider bg-light-alt">

  <!-- Toast -->
  <div class="toast-box" id="toast"></div>

  <div class="nk-wrap">
    <main class="nk-pages">
      <div class="section">
        <div class="container">
          <div class="nk-blocks d-flex justify-content-center">

            <div class="ath-container m-0">
              <div class="ath-body">

                <!-- Logo -->
                <center>
                  <a href="/" class="text-center mb-3">
                    <img src="/assets/images/logo.png" style="height:50px" />
                  </a>
                </center>

                <!-- Title -->
                <h5 class="ath-heading title">Reset Password</h5>

                <p class="verify-subtitle" style="color:#8094ae;text-align:center;font-size:0.9rem;line-height:1.6;margin-bottom:6px;">
                  Enter the 6-digit code sent to your email,<br>then set your new password.
                </p>

                <div class="email-hint" id="emailHint"></div>

                <!-- OTP Section -->
                <div class="section-label">Verification Code</div>
                <div class="code-inputs">
                  <input class="code-input" type="text" maxlength="1" inputmode="numeric" autocomplete="off">
                  <input class="code-input" type="text" maxlength="1" inputmode="numeric" autocomplete="off">
                  <input class="code-input" type="text" maxlength="1" inputmode="numeric" autocomplete="off">
                  <input class="code-input" type="text" maxlength="1" inputmode="numeric" autocomplete="off">
                  <input class="code-input" type="text" maxlength="1" inputmode="numeric" autocomplete="off">
                  <input class="code-input" type="text" maxlength="1" inputmode="numeric" autocomplete="off">
                </div>

                <div class="divider"></div>

                <!-- New Password Section -->
                <div class="section-label">New Password</div>

                <div class="field-item">
                  <div class="field-wrap">
                    <input type="password" id="newPassword" class="input-bordered" placeholder="New password">
                  </div>
                  <div class="show-password-wrap">
                    <input type="checkbox" id="showPass1" onchange="togglePass('newPassword', this)">
                    <label for="showPass1">Show Password</label>
                  </div>
                </div>

                <div class="field-item">
                  <div class="field-wrap">
                    <input type="password" id="confirmPassword" class="input-bordered" placeholder="Confirm new password">
                  </div>
                  <div class="show-password-wrap">
                    <input type="checkbox" id="showPass2" onchange="togglePass('confirmPassword', this)">
                    <label for="showPass2">Show Password</label>
                  </div>
                </div>

                <button id="resetBtn" class="btn btn-secondary btn-block btn-md" style="margin-top:8px;">
                  Reset Password
                </button>

                <div class="resend-row">
                  Didn't receive the code?
                  <button class="resend-link" id="resendBtn">Resend code</button>
                  <span class="resend-timer" id="resendTimer"></span>
                </div>

              </div>
            </div>

          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- jQuery -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>

  <script>
    const inputs      = document.querySelectorAll('.code-input');
    const resetBtn    = document.getElementById('resetBtn');
    const resendBtn   = document.getElementById('resendBtn');
    const resendTimer = document.getElementById('resendTimer');
    const toast       = document.getElementById('toast');
    const emailHint   = document.getElementById('emailHint');

    // ── Get email from URL ──
    const urlParams = new URLSearchParams(window.location.search);
    const userEmail = urlParams.get('email');

    if (!userEmail) {
      showToast('⚠️ Invalid reset link.', false);
      setTimeout(() => window.location.href = '/auth/forgot-password.html', 2500);
    } else {
      emailHint.textContent = userEmail;
    }

    // ── Toast ──
    let toastTimeout;
    function showToast(message, success = true) {
      clearTimeout(toastTimeout);
      toast.textContent = message;
      toast.style.background = success ? '#1ee0ac' : '#e74c3c';
      toast.style.color = success ? '#1c2b46' : '#fff';
      toast.classList.add('show');
      toastTimeout = setTimeout(() => toast.classList.remove('show'), 3500);
    }

    // ── Show/hide password ──
    function togglePass(id, checkbox) {
      document.getElementById(id).type = checkbox.checked ? 'text' : 'password';
    }

    // ── Get full code ──
    function getCode() {
      return Array.from(inputs).map(i => i.value).join('');
    }

    // ── OTP input behaviour ──
    inputs.forEach((input, i) => {
      input.addEventListener('input', () => {
        input.value = input.value.replace(/\D/g, '');
        if (input.value) {
          input.classList.add('filled');
          if (i < inputs.length - 1) inputs[i + 1].focus();
        } else {
          input.classList.remove('filled');
        }
      });

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !input.value && i > 0) {
          inputs[i - 1].focus();
          inputs[i - 1].classList.remove('filled');
        }
      });

      input.addEventListener('paste', (e) => {
        const pasted = e.clipboardData.getData('text').replace(/\D/g, '').slice(0, 6);
        if (pasted.length === 6) {
          inputs.forEach((inp, idx) => {
            inp.value = pasted[idx] || '';
            inp.classList.toggle('filled', !!inp.value);
          });
          inputs[5].focus();
        }
        e.preventDefault();
      });
    });

    // ── Cooldown timer ──
    let cooldown = 0;
    let timerInterval = null;

    function startCooldown() {
      cooldown = 60;
      resendBtn.disabled = true;
      resendTimer.textContent = `(${cooldown}s)`;
      timerInterval = setInterval(() => {
        cooldown--;
        resendTimer.textContent = `(${cooldown}s)`;
        if (cooldown <= 0) {
          clearInterval(timerInterval);
          resendBtn.disabled = false;
          resendTimer.textContent = '';
        }
      }, 1000);
    }

    startCooldown();

    // ── Reset Password ──
    resetBtn.addEventListener('click', async () => {
      const code           = getCode();
      const newPassword    = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (code.length < 6) {
        showToast('⚠️ Enter the full 6-digit code.', false); return;
      }
      if (!newPassword) {
        showToast('⚠️ Enter your new password.', false); return;
      }
      if (newPassword.length < 6) {
        showToast('⚠️ Password must be at least 6 characters.', false); return;
      }
      if (newPassword !== confirmPassword) {
        showToast('⚠️ Passwords do not match.', false); return;
      }

      resetBtn.disabled = true;
      resetBtn.textContent = 'Resetting...';

      try {
        const res = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: userEmail, code, newPassword })
        });
        const data = await res.json();

        if (data.success) {
          showToast('✅ ' + data.message, true);
          setTimeout(() => window.location.href = '/auth/login.html', 2000);
        } else {
          showToast('⚠️ ' + data.message, false);
          resetBtn.disabled = false;
          resetBtn.textContent = 'Reset Password';
        }
      } catch {
        showToast('⚠️ Network error. Try again.', false);
        resetBtn.disabled = false;
        resetBtn.textContent = 'Reset Password';
      }
    });

    // ── Resend ──
    resendBtn.addEventListener('click', async () => {
      if (cooldown > 0) return;
      resendBtn.disabled = true;
      resendBtn.textContent = 'Sending...';

      try {
        const res = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: userEmail })
        });
        const data = await res.json();
        showToast(data.success ? '✅ ' + data.message : '⚠️ ' + data.message, data.success);
        if (data.success) startCooldown();
      } catch {
        showToast('⚠️ Network error. Try again.', false);
      } finally {
        resendBtn.textContent = 'Resend code';
        if (cooldown <= 0) resendBtn.disabled = false;
      }
    });
  </script>

</body>
</html>
