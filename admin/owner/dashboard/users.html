<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Users</title>
    <link rel="stylesheet" href="/admin/owner/dashboard/css/layout.css" />
    <link rel="stylesheet" href="/admin/owner/dashboard/css/users.css" />
    <link rel="icon" href="/assets/images/logo.png" />

    <style>
      /* Modal Styles */
      .modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.6);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }

      .modal-content {
        background: white;
        padding: 30px;
        border-radius: 12px;
        max-width: 500px;
        width: 90%;
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
      }

      .modal-content h3 {
        margin-top: 0;
        margin-bottom: 10px;
        color: #0b2f55;
        font-size: 20px;
      }

      .modal-content p {
        color: #495057;
        margin-bottom: 20px;
      }

      .modal-content textarea {
        width: 100%;
        padding: 12px;
        border: 1px solid #ced4da;
        border-radius: 6px;
        font-size: 14px;
        font-family: inherit;
        resize: vertical;
        box-sizing: border-box;
      }

      .modal-content textarea:focus {
        outline: none;
        border-color: #0b2f55;
        box-shadow: 0 0 0 3px rgba(11, 47, 85, 0.1);
      }

      .modal-buttons {
        margin-top: 20px;
        display: flex;
        gap: 10px;
        justify-content: flex-end;
      }

      .modal-btn {
        padding: 10px 24px;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
      }

      .modal-btn-secondary {
        background-color: #6c757d;
        color: white;
      }

      .modal-btn-secondary:hover {
        background-color: #5a6268;
      }

      .modal-btn-primary {
        background-color: #0b2f55;
        color: white;
      }

      .modal-btn-primary:hover {
        background-color: #08213d;
      }

      .modal-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
    </style>

    <style>
      /* ===== Modal Wrapper ===== */
      .am-modal {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* ===== Backdrop ===== */
      .am-backdrop {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.55);
        backdrop-filter: blur(3px);
      }

      /* ===== Dialog ===== */
      .am-dialog {
        position: relative;
        width: 100%;
        max-width: 500px;
        background: #ffffff;
        border-radius: 14px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
        animation: amFadeIn 0.2s ease;
        z-index: 2;
        overflow: hidden;
      }

      /* ===== Animation ===== */
      @keyframes amFadeIn {
        from {
          opacity: 0;
          transform: translateY(15px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ===== Header ===== */
      .am-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 22px;
        border-bottom: 1px solid #eee;
      }

      .am-title {
        font-size: 18px;
        font-weight: 600;
      }

      .am-sub {
        font-size: 13px;
        color: #6b7280;
      }

      .am-x {
        background: none;
        border: none;
        font-size: 22px;
        cursor: pointer;
        color: #888;
      }

      .am-x:hover {
        color: #000;
      }

      /* ===== Body ===== */
      .am-body {
        padding: 22px;
      }

      /* User Info */
      .am-userline {
        margin-bottom: 30px;
        padding-bottom: 5px;
        display: flex;
        gap: 5px;
        border-bottom: #888 2px solid;
      }

      .am-name {
        font-weight: 600;
        font-size: 16px;
      }

      .am-email {
        font-size: 13px;
        color: #6b7280;
      }

      /* ===== Buttons Grid ===== */
      .am-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      /* Buttons */
      .am-btn {
        padding: 12px;
        border-radius: 8px;
        font-size: 14px;
        border: none;
        cursor: pointer;
        transition: 0.2s ease;
      }

      /* Variants */
      .am-primary {
        background: #1f2937;
        color: #fff;
      }

      .am-primary:hover {
        background: #111827;
      }

      .am-light {
        background: #f3f4f6;
        color: #111;
      }

      .am-light:hover {
        background: #e5e7eb;
      }

      .am-danger {
        background: #dc2626;
        color: #fff;
        grid-column: span 2; /* full width */
      }

      .am-danger:hover {
        background: #b91c1c;
      }

      /* ===== Mobile ===== */
      @media (max-width: 500px) {
        .am-dialog {
          margin: 20px;
        }

        .am-actions {
          grid-template-columns: 1fr;
        }

        .am-danger {
          grid-column: span 1;
        }
      }

      /* ✅ Force hide when d-none is present */
      .d-none {
        display: none !important;
      }

      /* ✅ Modal should not block clicks when hidden */
      .am-modal.d-none {
        display: none !important;
        pointer-events: none !important;
      }
    </style>

    <!-- search input style -->
      <style>
      .search-wrap {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 18px;
      }

      .search-input-wrap {
        position: relative;
        flex: 1;
        max-width: 400px;
      }

      .search-input-wrap svg {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        width: 16px;
        height: 16px;
        color: #9ca3af;
        pointer-events: none;
      }

      #userSearchInput {
        width: 100%;
        padding: 9px 12px 9px 38px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        font-size: 14px;
        outline: none;
        background: #fff;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
        box-sizing: border-box;
      }

      #userSearchInput:focus {
        border-color: #6366f1;
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.12);
      }

      #userSearchInput::placeholder {
        color: #9ca3af;
      }

      #searchClearBtn {
        display: none;
        background: none;
        border: none;
        cursor: pointer;
        padding: 4px 8px;
        color: #6b7280;
        font-size: 18px;
        line-height: 1;
        border-radius: 6px;
      }

      #searchClearBtn:hover {
        background: #f3f4f6;
        color: #111;
      }

      #searchResultCount {
        font-size: 13px;
        color: #6b7280;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <!-- Topnav -->
    <header id="topnav-mount"></header>

    <div class="admin-shell">
      <!-- Sidebar -->
      <aside id="sidebar-mount" class="admin-sidebar"></aside>

      <!-- Main -->
      <main class="admin-main">
        <div class="admin-container">
          <h1>All Users</h1>

          <div class="admin-card">

               <!-- Search Bar -->
            <div class="search-wrap">
              <div class="search-input-wrap">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <circle cx="11" cy="11" r="8" />
                  <path d="M21 21l-4.35-4.35" />
                </svg>
                <input
                  type="text"
                  id="userSearchInput"
                  placeholder="Search by name or email…"
                  autocomplete="off"
                />
              </div>
              <button id="searchClearBtn" title="Clear search">×</button>
              <span id="searchResultCount"></span>
            </div>
            <div class="table-wrap">
              <table class="admin-table">
                <thead>
                  <tr>
                    <th>Full Name</th>
                    <th>Email</th>
                    <th>Deposit</th>
                    <th>Withdraw</th>
                    <th>Login</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="usersTbody">
                  <tr>
                    <td colspan="5">Loading...</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </main>
    </div>

    <!-- Reason Modal -->
    <div id="reasonModal" class="modal">
      <div class="modal-content">
        <h3>Disable Transfers</h3>
        <p>
          Please provide a reason why you're disabling transfers for this user.
          This message will be shown to the user when they attempt to make a
          transfer.
        </p>

        <textarea
          id="transferReasonInput"
          rows="4"
          placeholder="Enter reason for disabling transfers..."
        ></textarea>

        <div class="modal-buttons">
          <button id="cancelReasonBtn" class="modal-btn modal-btn-secondary">
            Cancel
          </button>
          <button id="submitReasonBtn" class="modal-btn modal-btn-primary">
            Submit
          </button>
        </div>
      </div>
    </div>

    <!-- ✅ More Actions Modal -->
    <!-- ✅ More Actions Modal -->
    <div id="moreActionsModal" class="am-modal d-none" aria-hidden="true">
      <div class="am-backdrop" data-am-close="1"></div>
      <div
        class="am-dialog"
        role="dialog"
        aria-modal="true"
        aria-labelledby="amTitle"
      >
        <div class="am-header">
          <div>
            <div id="amTitle" class="am-title">User Actions</div>
            <div class="am-sub">Choose what you want to do</div>
          </div>
          <button type="button" class="am-x" data-am-close="1">×</button>
        </div>
        <div class="am-body">
          <div class="am-userline">
            <div class="am-name" id="amUserName">—</div>
            (<span class="am-email" id="amUserEmail">—</span>)
          </div>

          <div style="display: flex; gap: 12px">
            <button id="amEditBtn" class="am-btn am-primary" style="flex: 1">
              Edit User
            </button>
            <button id="amEmailBtn" class="am-btn am-light" style="flex: 1">
              Send Email
            </button>
          </div>

          <div style="margin-top: 12px; display: flex; gap: 12px">
            <button id="amDepositsBtn" class="am-btn am-light" style="flex: 1">
              User Deposits
            </button>
            <button
              id="amWithdrawalsBtn"
              class="am-btn am-light"
              style="flex: 1"
            >
              User Withdrawals
            </button>
          </div>

          <div style="margin-top: 12px; display: flex; gap: 12px">
            <button
              id="amAddDepositBtn"
              class="am-btn am-primary"
              style="flex: 1"
            >
              Add Deposit
            </button>
            <button
              id="amAddWithdrawBtn"
              class="am-btn am-danger"
              style="flex: 1"
            >
              Add Withdrawal
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer id="footer-mount"></footer>

    <script src="/admin-script/admin-auth-required.js"></script>
    <script src="/admin-script/admin-logout.js"></script>
    <script src="/admin-script/get-all-users.js"></script>
    <script src="/admin-script/admin-layout.js"></script>

      <script>
      (function () {
        const searchInput = document.getElementById("userSearchInput");
        const clearBtn = document.getElementById("searchClearBtn");
        const resultCount = document.getElementById("searchResultCount");

        function filterUsers() {
          const query = searchInput.value.trim().toLowerCase();
          const tbody = document.getElementById("usersTbody");
          const rows = tbody.querySelectorAll("tr");

          clearBtn.style.display = query ? "inline-block" : "none";

          let visible = 0;
          rows.forEach((row) => {
            // Name is col 0, Email is col 1
            const name = (row.cells[0]?.textContent || "").toLowerCase();
            const email = (row.cells[1]?.textContent || "").toLowerCase();
            const match =
              !query || name.includes(query) || email.includes(query);
            row.style.display = match ? "" : "none";
            if (match) visible++;
          });

          // Show count only when searching
          if (query) {
            resultCount.textContent = `${visible} result${visible !== 1 ? "s" : ""}`;
          } else {
            resultCount.textContent = "";
          }
        }

        searchInput.addEventListener("input", filterUsers);

        clearBtn.addEventListener("click", function () {
          searchInput.value = "";
          filterUsers();
          searchInput.focus();
        });

        // Re-run filter after the table loads (in case get-all-users.js populates it async)
        const tbody = document.getElementById("usersTbody");
        const observer = new MutationObserver(function () {
          if (searchInput.value.trim()) filterUsers();
        });
        observer.observe(tbody, { childList: true, subtree: true });
      })();
    </script>
  </body>
</html>
