    <style>
        .main-content {
            margin-left: 250px;
            transition: margin-left 0.3s ease;
        }
        @media (max-width: 1199px) {
            .main-content { margin-left: 0; }
        }

        /* ---- Preloader ---- */
        #page-preloader {
            position: fixed;
            inset: 0;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 99999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        #page-preloader.fade-out {
            opacity: 0;
            visibility: hidden;
        }
        .preloader-logo {
            height: 56px;
            margin-bottom: 28px;
            animation: pulse-logo 1.6s ease-in-out infinite;
        }
        @keyframes pulse-logo {
            0%, 100% { transform: scale(1);    opacity: 1; }
            50%       { transform: scale(1.06); opacity: 0.8; }
        }
        .preloader-bar-wrap {
            width: 200px;
            height: 4px;
            background: #e9ecef;
            border-radius: 99px;
            overflow: hidden;
        }
        .preloader-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #f5a623, #ffd166);
            border-radius: 99px;
            animation: bar-fill 1.8s ease forwards;
        }
        @keyframes bar-fill {
            0%   { width: 0%; }
            60%  { width: 75%; }
            100% { width: 100%; }
        }
        .preloader-text {
            margin-top: 14px;
            font-family: 'Open Sans', sans-serif;
            font-size: 0.78rem;
            font-weight: 600;
            color: #8898aa;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        /* ---- Profile Header ---- */
        .profile-header {
            background: linear-gradient(135deg, #1a1f2e 0%, #2d3561 100%);
            padding: 3rem 0 6rem;
            position: relative;
        }

        .profile-header h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #fff;
            text-transform: capitalize;
            margin-bottom: 0.5rem;
        }

        .profile-header p {
            color: rgba(255,255,255,0.75);
            font-size: 0.95rem;
            margin: 0;
        }

        /* ---- Profile Card ---- */
        .card-profile {
            margin-top: -4rem;
            position: relative;
        }

        .card-profile .card-cover {
            height: 160px;
            object-fit: cover;
            width: 100%;
            border-radius: 0.5rem 0.5rem 0 0;
            display: block;
        }

        .card-profile-image-wrap {
            display: flex;
            justify-content: center;
            margin-top: -48px;
            margin-bottom: 0.75rem;
        }

        .card-profile-image-wrap img {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            border: 4px solid #fff;
            object-fit: cover;
            background: #fff;
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
        }

        .profile-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            padding: 0 1rem 1rem;
        }

        .profile-stat-item {
            text-align: center;
        }

        .profile-stat-item .heading {
            display: block;
            font-size: 1.1rem;
            font-weight: 700;
            color: #32325d;
            line-height: 1.3;
        }

        .profile-stat-item .description {
            display: block;
            font-size: 0.75rem;
            color: #8898aa;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
            margin-top: 2px;
        }

        .profile-name {
            text-align: center;
            padding: 0 1rem 1.25rem;
        }

        .profile-name h3 {
            font-size: 1.1rem;
            font-weight: 700;
            color: #32325d;
            text-transform: capitalize;
            margin-bottom: 4px;
        }

        .profile-name p {
            font-size: 0.875rem;
            color: #8898aa;
            margin: 0;
        }

        /* ---- Edit Profile Form ---- */
        .form-control-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: #525f7f;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 0.4rem;
            display: block;
        }

        .form-control {
            border: 1px solid #dee2e6;
            border-radius: 0.375rem;
            padding: 0.6rem 0.9rem;
            font-size: 0.875rem;
            color: #495057;
            background: #fff;
            transition: border-color 0.2s, box-shadow 0.2s;
            width: 100%;
            font-family: 'Open Sans', sans-serif;
            display: block;
        }

        .form-control:focus {
            border-color: #f5a623;
            box-shadow: 0 0 0 3px rgba(245,166,35,0.15);
            outline: none;
        }

        .form-control[readonly] {
            background: #f8f9fa;
            cursor: default;
        }

        .form-group { margin-bottom: 1.25rem; }

        .btn-save {
            background: #f5a623;
            color: #fff;
            border: none;
            border-radius: 0.375rem;
            padding: 0.65rem 1.75rem;
            font-size: 0.875rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s;
            font-family: 'Open Sans', sans-serif;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }

        .btn-save:hover {
            background: #e09510;
            transform: translateY(-1px);
        }

        .btn-save:disabled {
            background: #adb5bd;
            cursor: not-allowed;
            transform: none;
        }

        /* ---- Toast ---- */
        .toast-box {
            position: fixed;
            top: 28px;
            right: 28px;
            padding: 13px 22px;
            border-radius: 6px;
            font-size: 0.875rem;
            font-weight: 600;
            font-family: 'Open Sans', sans-serif;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            opacity: 0;
            transform: translateY(-10px);
            transition: opacity 0.35s ease, transform 0.35s ease;
            z-index: 99999;
            pointer-events: none;
            max-width: 320px;
        }
        .toast-box.show {
            opacity: 1;
            transform: translateY(0);
        }
    </style>

    <script>
        // ── Preloader ──
        window.addEventListener('load', function () {
            const preloader = document.getElementById('page-preloader');
            setTimeout(function () {
                preloader.classList.add('fade-out');
                setTimeout(function () { preloader.style.display = 'none'; }, 500);
            }, 400);
        });

        // ── Toast ──
        let toastTimeout;
        function showToast(message, success = true) {
            clearTimeout(toastTimeout);
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.background = success ? '#2dce89' : '#f5365c';
            toast.style.color = '#fff';
            toast.classList.add('show');
            toastTimeout = setTimeout(() => toast.classList.remove('show'), 3500);
        }

        // ── Profile form — intercept submit and show toast feedback ──
        // update-profile.js handles the actual API call.
        // We just hook in for UX feedback if it doesn't have its own toast.
        const profileForm = document.getElementById('profile-form');
        if (profileForm) {
            profileForm.addEventListener('submit', function () {
                const btn = document.getElementById('save-btn');
                if (btn) {
                    btn.disabled = true;
                    btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> Saving...';
                    setTimeout(function () {
                        btn.disabled = false;
                        btn.innerHTML = '<i class="fa fa-check"></i> Save Changes';
                    }, 3000);
                }
            });
        }
    </script>
