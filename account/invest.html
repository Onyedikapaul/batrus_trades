    <style>
        .main-content {
            margin-left: 250px;
            transition: margin-left 0.3s ease;
        }
        @media (max-width: 1199px) {
            .main-content { margin-left: 0; }
        }

        /* ---- Preloader ---- */
        #page-preloader {
            position: fixed;
            inset: 0;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 99999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        #page-preloader.fade-out {
            opacity: 0;
            visibility: hidden;
        }
        .preloader-logo {
            height: 56px;
            margin-bottom: 28px;
            animation: pulse-logo 1.6s ease-in-out infinite;
        }
        @keyframes pulse-logo {
            0%, 100% { transform: scale(1);    opacity: 1; }
            50%       { transform: scale(1.06); opacity: 0.8; }
        }
        .preloader-bar-wrap {
            width: 200px;
            height: 4px;
            background: #e9ecef;
            border-radius: 99px;
            overflow: hidden;
        }
        .preloader-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #f5a623, #ffd166);
            border-radius: 99px;
            animation: bar-fill 1.8s ease forwards;
        }
        @keyframes bar-fill {
            0%   { width: 0%; }
            60%  { width: 75%; }
            100% { width: 100%; }
        }
        .preloader-text {
            margin-top: 14px;
            font-family: 'Open Sans', sans-serif;
            font-size: 0.78rem;
            font-weight: 600;
            color: #8898aa;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        /* ---- Plan cards ---- */
        .plan-card {
            background: #fff;
            border: 1px solid #e9ecef;
            border-radius: 0.5rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            transition: box-shadow 0.2s, transform 0.2s;
        }
        .plan-card:hover {
            box-shadow: 0 6px 24px rgba(0,0,0,0.1);
            transform: translateY(-2px);
        }
        .plan-card-info h5 {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #525f7f;
            margin-bottom: 0.75rem;
        }
        .plan-card-info p {
            font-size: 0.875rem;
            color: #525f7f;
            margin-bottom: 0.3rem;
        }
        .plan-card-info p span {
            font-weight: 600;
            color: #32325d;
        }
        .plan-card-info .plan-return {
            color: #2dce89;
            font-weight: 700;
        }
        .btn-invest {
            background: #f5a623;
            color: #fff;
            border: none;
            border-radius: 0.375rem;
            padding: 0.65rem 1.5rem;
            font-size: 0.875rem;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.2s, transform 0.15s;
            font-family: 'Open Sans', sans-serif;
        }
        .btn-invest:hover {
            background: #e09510;
            transform: translateY(-1px);
        }
        .plans-loading {
            text-align: center;
            padding: 2rem 0;
            color: #8898aa;
            font-size: 0.9rem;
        }
    </style>

<body>

    <!-- Preloader -->
    <div id="page-preloader">
        <img src="/assets/images/logo.png" class="preloader-logo" alt="Batrus Trades">
        <div class="preloader-bar-wrap">
            <div class="preloader-bar"></div>
        </div>
        <div class="preloader-text">Loading plans...</div>
    </div>

    <!-- Sidenav -->
    <div id="sidenav-mount"></div>

    <div class="main-content" id="panel">
        <!-- Topnav -->
        <div id="topnav-mount"></div>

        <!-- Header -->
        <div class="header bg-primary pb-6">
            <div class="container-fluid">
                <div class="header-body">
                    <div class="row align-items-center py-4">
                        <div class="col-12">
                            <h6 class="h2 text-white d-inline-block mb-0">Select a plan</h6>
                            <nav aria-label="breadcrumb" class="d-none d-md-inline-block ml-md-4">
                                <ol class="breadcrumb breadcrumb-links breadcrumb-dark">
                                    <li class="breadcrumb-item"><a href="/account/"><i class="fa fa-home text-default"></i></a></li>
                                    <li class="breadcrumb-item active">Invest</li>

                            </nav>
                        </div>
                    </div>

        <!-- Page content -->
        <div class="container-fluid mt--6">

                <div class="card-body">

                    <div class="row" id="plans-container">
                        <div class="col-12 plans-loading">
                            <i class="fa fa-spinner fa-spin mr-2"></i> Loading plans...
                        </div>
                    </div>
                </div>
            </div>

            <!-- Footer -->
            <footer class="footer pt-0">
                <div class="row align-items-center justify-content-lg-between">
                    <div class="col-lg-6">
                        <div class="copyright text-center text-lg-left text-muted">
                            &copy; 2026 <a href="/account" class="font-weight-bold ml-1" target="_blank">Batrus Trades</a>
                        </div>
                    </div>
                    <div class="col-lg-6">
                        <ul class="nav nav-footer justify-content-center justify-content-lg-end">
                            <li class="nav-item">
                                <a href="/account/terms.html" class="nav-link">Terms</a>
                            </li>
                        </ul>
                    </div>
                </div>

        </div>

    <!-- Preloader hide -->
    <script>
        window.addEventListener('load', function () {
            const preloader = document.getElementById('page-preloader');
            setTimeout(function () {
                preloader.classList.add('fade-out');
                setTimeout(function () { preloader.style.display = 'none'; }, 500);
            }, 400);
        });
    </script>

    <!-- Invest script (renders plan cards into #plans-container) -->
    <script src="/auth-script/invest.js"></script>
