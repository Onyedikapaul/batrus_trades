    <style>
        .main-content {
            margin-left: 250px;
            transition: margin-left 0.3s ease;
        }
        @media (max-width: 1199px) {
            .main-content { margin-left: 0; }
        }

        /* ---- Preloader ---- */
        #page-preloader {
            position: fixed; inset: 0; background: #fff;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 99999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        #page-preloader.fade-out { opacity: 0; visibility: hidden; }
        .preloader-logo { height: 56px; margin-bottom: 28px; animation: pulse-logo 1.6s ease-in-out infinite; }
        @keyframes pulse-logo {
            0%, 100% { transform: scale(1); opacity: 1; }
            50%       { transform: scale(1.06); opacity: 0.8; }
        }
        .preloader-bar-wrap { width: 200px; height: 4px; background: #e9ecef; border-radius: 99px; overflow: hidden; }
        .preloader-bar {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, #f5a623, #ffd166);
            border-radius: 99px;
            animation: bar-fill 1.8s ease forwards;
        }
        @keyframes bar-fill { 0% { width: 0%; } 60% { width: 75%; } 100% { width: 100%; } }
        .preloader-text {
            margin-top: 14px; font-family: 'Open Sans', sans-serif;
            font-size: 0.78rem; font-weight: 600;
            color: #8898aa; letter-spacing: 0.08em; text-transform: uppercase;
        }

        /* ---- Table ---- */
        .deposit-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.875rem;
        }

        .deposit-table thead th {
            background: #f6f9fc;
            color: #8898aa;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            padding: 0.85rem 1rem;
            border-bottom: 1px solid #e9ecef;
            white-space: nowrap;
        }

        .deposit-table tbody td {
            padding: 0.9rem 1rem;
            border-bottom: 1px solid #f0f0f0;
            color: #525f7f;
            vertical-align: middle;
        }

        .deposit-table tbody tr:last-child td { border-bottom: none; }

        .deposit-table tbody tr:hover td { background: #f8f9fe; }

        /* Amount cell */
        .deposit-table .td-amount {
            font-weight: 700;
            color: #32325d;
        }
        .deposit-table .td-amount .coin-label {
            font-size: 0.75rem;
            font-weight: 400;
            color: #8898aa;
            margin-left: 4px;
        }

        /* Transaction ID */
        .deposit-table .td-txid {
            font-family: monospace;
            font-size: 0.78rem;
            color: #f5a623;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Status badges */
        .badge-status {
            display: inline-block;
            padding: 0.3rem 0.75rem;
            border-radius: 99px;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: capitalize;
            letter-spacing: 0.03em;
        }
        .badge-confirmed { background: #d4f5e9; color: #1a7a50; }
        .badge-pending   { background: #fdecd0; color: #9a5a00; }
        .badge-failed    { background: #fde0e0; color: #9a1a1a; }

        /* View button */
        .btn-view {
            background: transparent;
            border: 1px solid #f5a623;
            color: #f5a623;
            border-radius: 0.375rem;
            padding: 0.35rem 0.85rem;
            font-size: 0.78rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Open Sans', sans-serif;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }
        .btn-view:hover {
            background: #f5a623;
            color: #fff;
        }

        /* Back link */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            color: #f5a623;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 1rem;
            text-decoration: none;
            transition: opacity 0.2s;
        }
        .back-link:hover { opacity: 0.8; color: #f5a623; }

        /* Responsive table */
        .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    </style>
