    <style>
        .main-content { margin-left: 250px; transition: margin-left 0.3s ease; }
        @media (max-width: 767px) { .main-content { margin-left: 0; } }

        /* Preloader */
        #page-preloader {
            position: fixed; inset: 0; background: #fff;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 99999; transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        #page-preloader.fade-out { opacity: 0; visibility: hidden; }
        .preloader-logo { height: 56px; margin-bottom: 28px; animation: pulse-logo 1.6s ease-in-out infinite; }
        @keyframes pulse-logo { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.06);opacity:.8} }
        .preloader-bar-wrap { width: 200px; height: 4px; background: #e9ecef; border-radius: 99px; overflow: hidden; }
        .preloader-bar { height: 100%; width: 0%; background: linear-gradient(90deg,#f5a623,#ffd166); border-radius: 99px; animation: bar-fill 1.8s ease forwards; }
        @keyframes bar-fill { 0%{width:0%} 60%{width:75%} 100%{width:100%} }
        .preloader-text { margin-top: 14px; font-family:'Open Sans',sans-serif; font-size:.78rem; font-weight:600; color:#8898aa; letter-spacing:.08em; text-transform:uppercase; }

        /* Tabs */
        .inv-tabs { display:flex; border-bottom:2px solid #e9ecef; margin-bottom:1.5rem; }
        .inv-tab { padding:.75rem 1.25rem; font-size:.875rem; font-weight:600; color:#8898aa; cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-2px; display:flex; align-items:center; gap:.4rem; transition:all .2s; user-select:none; }
        .inv-tab:hover { color:#525f7f; }
        .inv-tab.active { color:#f5a623; border-bottom-color:#f5a623; }
        .inv-tab .badge { background:#e9ecef; color:#525f7f; border-radius:99px; padding:.15rem .5rem; font-size:.72rem; font-weight:700; min-width:22px; text-align:center; }
        .inv-tab.active .badge { background:#f5a623; color:#fff; }

        .inv-panel { display:none; }
        .inv-panel.active { display:block; }

        /* Empty state */
        .empty-state { text-align:center; padding:3rem 1rem; color:#8898aa; }
        .empty-state i { font-size:2.5rem; margin-bottom:1rem; display:block; opacity:.4; }
        .empty-state p { font-size:.95rem; margin:0; }

        /* Inv card */
        .inv-card { border:1px solid #e9ecef; border-radius:.5rem; padding:1.25rem 1.5rem; margin-bottom:1rem; background:#fff; transition:box-shadow .2s; }
        .inv-card:hover { box-shadow:0 4px 16px rgba(0,0,0,.08); }
        .inv-card-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:.75rem; }
        .inv-card-title { font-weight:700; font-size:1rem; color:#32325d; }
        .inv-badge { display:inline-flex; align-items:center; padding:.3rem .75rem; border-radius:99px; font-size:.72rem; font-weight:700; text-transform:uppercase; letter-spacing:.05em; }
        .inv-badge.active    { background:#e6faf4; color:#2dce89; }
        .inv-badge.completed { background:#e8f4fd; color:#1171ef; }
        .inv-badge.cancelled { background:#fdecea; color:#f5365c; }
        .inv-card-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:.75rem 1rem; }
        .inv-card-field label { font-size:.7rem; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:#8898aa; display:block; margin-bottom:.2rem; }
        .inv-card-field span { font-size:.9rem; font-weight:600; color:#32325d; }
        .inv-progress-wrap { margin-top:.75rem; }
        .inv-progress-label { display:flex; justify-content:space-between; font-size:.75rem; color:#8898aa; margin-bottom:.3rem; }
        .inv-progress-bar { height:6px; background:#e9ecef; border-radius:99px; overflow:hidden; }
        .inv-progress-fill { height:100%; background:linear-gradient(90deg,#f5a623,#ffd166); border-radius:99px; transition:width .6s ease; }

        /* Loading dots */
        .loading-dots { display:flex; align-items:center; justify-content:center; gap:6px; padding:3rem; }
        .loading-dots span { width:8px; height:8px; border-radius:50%; background:#f5a623; animation:dot-bounce 1.2s infinite ease-in-out; }
        .loading-dots span:nth-child(2){animation-delay:.2s}
        .loading-dots span:nth-child(3){animation-delay:.4s}
        @keyframes dot-bounce { 0%,80%,100%{transform:scale(.6);opacity:.4} 40%{transform:scale(1);opacity:1} }
    </style>

    <script>
        // Hide preloader
        window.addEventListener('load', function () {
            var preloader = document.getElementById('page-preloader');
            setTimeout(function () {
                preloader.classList.add('fade-out');
                setTimeout(function () { preloader.style.display = 'none'; }, 500);
            }, 400);
        });

        // Tab switching
        document.querySelectorAll('.inv-tab').forEach(function(tab) {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.inv-tab').forEach(function(t) { t.classList.remove('active'); });
                document.querySelectorAll('.inv-panel').forEach(function(p) { p.classList.remove('active'); });
                tab.classList.add('active');
                document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
            });
        });

        // Global function investments.js can call
        window.renderInvestmentTabs = function(active, completed, cancelled) {
            active = active || []; completed = completed || []; cancelled = cancelled || [];
            document.getElementById('badge-active').textContent    = active.length;
            document.getElementById('badge-completed').textContent = completed.length;
            document.getElementById('badge-cancelled').textContent = cancelled.length;
            renderList('panel-active',    active,    'active',    'No active investments');
            renderList('panel-completed', completed, 'completed', 'No completed investments');
            renderList('panel-cancelled', cancelled, 'cancelled', 'No cancelled investments');
        };

        function renderList(panelId, items, status, emptyMsg) {
            var panel = document.getElementById(panelId);
            if (!items || items.length === 0) {
                panel.innerHTML = '<div class="empty-state"><i class="fa fa-inbox"></i><p>' + emptyMsg + '</p></div>';
                return;
            }
            var html = '';
            items.forEach(function(inv) {
                var progress = inv.progress || 0;
                html += '<div class="inv-card">';
                html += '<div class="inv-card-header"><div class="inv-card-title">' + (inv.plan || inv.planName || 'Investment Plan') + '</div>';
                html += '<span class="inv-badge ' + status + '">' + status.charAt(0).toUpperCase() + status.slice(1) + '</span></div>';
                html += '<div class="inv-card-grid">';
                if (inv.amount)   html += field('Amount',   '$' + inv.amount);
                if (inv.profit)   html += field('Profit',   '$' + inv.profit);
                if (inv.roi)      html += field('ROI',      inv.roi + '%');
                if (inv.start)    html += field('Started',  inv.start);
                if (inv.end)      html += field('Ends',     inv.end);
                if (inv.duration) html += field('Duration', inv.duration);
                html += '</div>';
                if (status === 'active') {
                    html += '<div class="inv-progress-wrap"><div class="inv-progress-label"><span>Progress</span><span>' + progress + '%</span></div>';
                    html += '<div class="inv-progress-bar"><div class="inv-progress-fill" style="width:' + progress + '%"></div></div></div>';
                }
                html += '</div>';
            });
            panel.innerHTML = html;
        }

        function field(label, value) {
            return '<div class="inv-card-field"><label>' + label + '</label><span>' + value + '</span></div>';
        }

        // Fallback for old investments.js using #active-investments / #completed-investments
        window.addEventListener('load', function() {
            setTimeout(function() {
                var oldActive    = document.getElementById('active-investments');
                var oldCompleted = document.getElementById('completed-investments');
                if (oldActive    && oldActive.children.length)    document.getElementById('panel-active').innerHTML    = oldActive.innerHTML;
                if (oldCompleted && oldCompleted.children.length) document.getElementById('panel-completed').innerHTML = oldCompleted.innerHTML;
                ['active','completed','cancelled'].forEach(function(s) {
                    var p = document.getElementById('panel-' + s);
                    if (p && p.querySelector('.loading-dots')) {
                        p.innerHTML = '<div class="empty-state"><i class="fa fa-inbox"></i><p>No ' + s + ' investments</p></div>';
                    }
                });
            }, 3000);
        });
    </script>
