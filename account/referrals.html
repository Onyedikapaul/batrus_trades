        #page-preloader {

        .preloader-bar-wrap {
            width: 200px; height: 4px;

            border-radius: 99px; overflow: hidden;
        }
        .preloader-bar {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, #f5a623, #ffd166);
            border-radius: 99px;
            animation: bar-fill 1.8s ease forwards;
        }
        @keyframes bar-fill {
            0% { width: 0%; } 60% { width: 75%; } 100% { width: 100%; }
        }
        .preloader-text {
            margin-top: 14px;
            font-family: 'Open Sans', sans-serif;
            font-size: 0.78rem; font-weight: 600;
            color: #8898aa; letter-spacing: 0.08em; text-transform: uppercase;
        }

        /* ---- Referral link row ---- */

            display: flex;

            gap: 0.5rem;
            padding: 1rem 0 0.5rem;
            flex-wrap: wrap;

        .referral-link-label {

            color: #525f7f;
            font-weight: 600;

        #referral-link-input {
            border: 1px solid #dee2e6;
            border-radius: 0.375rem;
            padding: 0.45rem 0.75rem;
            font-size: 0.8rem;
            color: #495057;
            background: #f8f9fa;
            min-width: 260px;
            max-width: 380px;
            width: 100%;
            font-family: 'Open Sans', sans-serif;
            outline: none;

        #referral-copy-btn {
            background: #f5a623;

            border-radius: 0.375rem;
            color: #fff;
            padding: 0.45rem 0.9rem;
            font-size: 0.85rem;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            font-family: 'Open Sans', sans-serif;
            font-weight: 600;
            white-space: nowrap;
        }
        #referral-copy-btn:hover { background: #e09510; transform: translateY(-1px); }

        /* ---- Toast ---- */
        .toast-box {
            position: fixed;
            top: 28px; right: 28px;
            padding: 13px 22px;
            border-radius: 6px;
            font-size: 0.875rem; font-weight: 600;
            font-family: 'Open Sans', sans-serif;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            opacity: 0; transform: translateY(-10px);
            transition: opacity 0.35s ease, transform 0.35s ease;
            z-index: 99999; pointer-events: none; max-width: 320px;
        }
        .toast-box.show { opacity: 1; transform: translateY(0); }

    <script>
        // ── Preloader ──
        window.addEventListener('load', function () {
            const preloader = document.getElementById('page-preloader');
            setTimeout(function () {
                preloader.classList.add('fade-out');
                setTimeout(function () { preloader.style.display = 'none'; }, 500);
            }, 400);
        });

        // ── Toast ──
        let toastTimeout;
        function showToast(message, success = true) {
            clearTimeout(toastTimeout);
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.background = success ? '#2dce89' : '#f5365c';
            toast.style.color = '#fff';
            toast.classList.add('show');
            toastTimeout = setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // ── Referral copy button ──
        document.getElementById('referral-copy-btn').addEventListener('click', function () {
            const input    = document.getElementById('referral-link-input');
            const icon     = document.getElementById('referral-copy-icon');
            const copyText = document.getElementById('referral-copy-text');
            const text     = input.value.trim();

            if (!text) return;

            function flashSuccess() {
                icon.classList.replace('fa-copy', 'fa-check');
                copyText.textContent = 'Copied!';
                showToast('✅ Referral link copied!', true);
                setTimeout(function () {
                    icon.classList.replace('fa-check', 'fa-copy');
                    copyText.textContent = 'Copy';
                }, 2500);
            }

            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(flashSuccess).catch(function () {
                    fallbackCopy();
                });
            } else {
                fallbackCopy();
            }

            function fallbackCopy() {
                input.select();
                input.setSelectionRange(0, 99999);
                try { document.execCommand('copy'); flashSuccess(); }
                catch (e) { showToast('⚠️ Could not copy. Please copy manually.', false); }
                window.getSelection()?.removeAllRanges();
            }
        });
    </script>
