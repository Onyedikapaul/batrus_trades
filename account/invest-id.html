    <style>
        .main-content {
            margin-left: 250px;
            transition: margin-left 0.3s ease;
        }
        @media (max-width: 1199px) {
            .main-content { margin-left: 0; }
        }

        /* ---- Preloader ---- */
        #page-preloader {
            position: fixed; inset: 0; background: #fff;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 99999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        #page-preloader.fade-out { opacity: 0; visibility: hidden; }
        .preloader-logo { height: 56px; margin-bottom: 28px; animation: pulse-logo 1.6s ease-in-out infinite; }
        @keyframes pulse-logo {
            0%, 100% { transform: scale(1); opacity: 1; }
            50%       { transform: scale(1.06); opacity: 0.8; }
        }
        .preloader-bar-wrap { width: 200px; height: 4px; background: #e9ecef; border-radius: 99px; overflow: hidden; }
        .preloader-bar {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, #f5a623, #ffd166);
            border-radius: 99px;
            animation: bar-fill 1.8s ease forwards;
        }
        @keyframes bar-fill { 0% { width: 0%; } 60% { width: 75%; } 100% { width: 100%; } }
        .preloader-text {
            margin-top: 14px; font-family: 'Open Sans', sans-serif;
            font-size: 0.78rem; font-weight: 600;
            color: #8898aa; letter-spacing: 0.08em; text-transform: uppercase;
        }

        /* ---- Form labels ---- */
        .form-control-label {
            font-size: 0.75rem; font-weight: 600;
            color: #525f7f; text-transform: uppercase;
            letter-spacing: 0.04em; margin-bottom: 0.4rem; display: block;
        }

        /* ---- Inputs ---- */
        .form-control {
            border: 1px solid #dee2e6; border-radius: 0.375rem;
            padding: 0.6rem 0.9rem; font-size: 0.875rem;
            color: #495057; background: #fff; width: 100%;
            transition: border-color 0.2s, box-shadow 0.2s;
            font-family: 'Open Sans', sans-serif; display: block;
        }
        .form-control:focus {
            border-color: #f5a623;
            box-shadow: 0 0 0 3px rgba(245,166,35,0.15);
            outline: none;
        }
        .form-control:disabled, .form-control[disabled] {
            background: #f8f9fa; cursor: default; color: #8898aa;
        }
        .form-group { margin-bottom: 1.25rem; }

        /* Balance display */
        .balance-display {
            font-size: 1.25rem;
            font-weight: 700;
            color: #32325d;
            padding: 0.4rem 0;
        }

        /* ---- Invest button ---- */
        .btn-invest-now {
            background: #f5a623; color: #fff; border: none;
            border-radius: 0.375rem; padding: 0.7rem 2.5rem;
            font-size: 0.9rem; font-weight: 700; cursor: pointer;
            transition: background 0.2s, transform 0.15s;
            font-family: 'Open Sans', sans-serif;
            display: inline-flex; align-items: center; gap: 0.4rem;
        }
        .btn-invest-now:hover { background: #e09510; transform: translateY(-1px); }
        .btn-invest-now:disabled { background: #adb5bd; cursor: not-allowed; transform: none; }

        /* ---- Plan details panel ---- */
        .plan-detail-panel {
            border: 1px solid #e9ecef;
            border-radius: 0.5rem;
            overflow: hidden;
        }

        .plan-detail-title {
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
            padding: 0.85rem 1.25rem;
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #525f7f;
        }

        .plan-detail-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.8rem 1.25rem;
            border-bottom: 1px solid #f0f0f0;
            font-size: 0.875rem;
            color: #525f7f;
        }
        .plan-detail-row:last-child { border-bottom: none; }

        .plan-detail-row .detail-label {
            display: flex; align-items: center; gap: 0.5rem;
        }
        .plan-detail-row .detail-label i {
            width: 18px; text-align: center; color: #8898aa;
        }

        .plan-detail-row strong {
            color: #32325d; font-weight: 700;
        }

        /* ---- Modal ---- */
        .modal-header { border-bottom: 1px solid #e9ecef; }
        .modal-footer { border-top: 1px solid #e9ecef; }

        .modal-header.success-header { background: #d4f5e9; }
        .modal-header.error-header   { background: #fde0e0; }

        #modal-btn {
            background: #f5a623; color: #fff; border: none;
            border-radius: 0.375rem; padding: 0.55rem 1.75rem;
            font-size: 0.875rem; font-weight: 700; cursor: pointer;
            font-family: 'Open Sans', sans-serif;
        }
        #modal-btn:hover { background: #e09510; }
    </style>

<body>

    <!-- Preloader -->
    <div id="page-preloader">
        <img src="/assets/images/logo.png" class="preloader-logo" alt="Batrus Trades">
        <div class="preloader-bar-wrap"><div class="preloader-bar"></div></div>
        <div class="preloader-text">Loading plan...</div>
    </div>

    <!-- Sidenav -->
    <div id="sidenav-mount"></div>

    <div class="main-content" id="panel">
        <!-- Topnav -->
        <div id="topnav-mount"></div>

        <!-- Header -->
        <div class="header bg-primary pb-6">
            <div class="container-fluid">
                <div class="header-body">
                    <div class="row align-items-center py-4">
                        <div class="col-12">
                            <h6 class="h2 text-white d-inline-block mb-0">Select a plan</h6>
                            <nav aria-label="breadcrumb" class="d-none d-md-inline-block ml-md-4">
                                <ol class="breadcrumb breadcrumb-links breadcrumb-dark">
                                    <li class="breadcrumb-item"><a href="/account/"><i class="fa fa-home"></i></a></li>
                                    <li class="breadcrumb-item active">Invest</li>
                                </ol>
                            </nav>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Page content -->
        <div class="container-fluid mt--6">
            <div class="card">
                <div class="card-body">
                    <div class="row">

                        <!-- Left: Invest form -->
                        <div class="col-sm-6 mb-4">
                            <form id="invest-form">
                                <div class="form-group">
                                    <label class="form-control-label">Balance</label>
                                    <div class="balance-display">
                                        $<span class="user-account-balance">0</span>
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label class="form-control-label" for="package">Package type</label>
                                    <input type="text" id="package" class="form-control" value="" disabled>
                                </div>
                                <div class="form-group">
                                    <label class="form-control-label" for="amount">How much do you want to invest? ($)</label>
                                    <input type="number" id="amount" class="form-control" placeholder="Enter amount" min="" max="" name="amount" required>
                                </div>
                                <button type="submit" id="invest-btn" class="btn-invest-now">
                                    <i class="fa fa-line-chart"></i> Invest
                                </button>
                            </form>
                        </div>

                        <!-- Right: Plan details -->
                        <div class="col-sm-6 mb-4">
                            <div class="plan-detail-panel">
                                <div class="plan-detail-title" id="package-title">Loading...</div>
                                <div class="plan-detail-row">
                                    <span class="detail-label"><i class="fa fa-chevron-down"></i> Min price</span>
                                    <strong id="min-price">—</strong>
                                </div>
                                <div class="plan-detail-row">
                                    <span class="detail-label"><i class="fa fa-chevron-up"></i> Max price</span>
                                    <strong id="max-price">—</strong>
                                </div>
                                <div class="plan-detail-row">
                                    <span class="detail-label"><i class="fa fa-line-chart"></i> Expected return</span>
                                    <strong id="expected-return">—</strong>
                                </div>
                                <div class="plan-detail-row">
                                    <span class="detail-label"><i class="fa fa-clock-o"></i> Duration</span>
                                    <strong id="duration">—</strong>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            </div>

            <!-- Footer -->
            <footer class="footer pt-0">
                <div class="row align-items-center justify-content-lg-between">
                    <div class="col-lg-6">
                        <div class="copyright text-center text-lg-left text-muted">
                            &copy; 2026 <a href="/account" class="font-weight-bold ml-1" target="_blank">Batrus Trades</a>
                        </div>
                    </div>
                    <div class="col-lg-6">
                        <ul class="nav nav-footer justify-content-center justify-content-lg-end">
                            <li class="nav-item">
                                <a href="/account/terms.html" class="nav-link">Terms</a>
                            </li>
                        </ul>
                    </div>
                </div>
            </footer>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="investModal" tabindex="-1" role="dialog" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered" role="document">
            <div class="modal-content">
                <div class="modal-header" id="modal-header">
                    <h5 class="modal-title" id="modal-title">Success</h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body text-center py-4">
                    <i id="modal-icon" class="fa fa-check-circle fa-3x text-success mb-3"></i>
                    <p id="modal-message" class="lead mb-0"></p>
                </div>
                <div class="modal-footer">
                    <button type="button" id="modal-btn" data-dismiss="modal">OK</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Local scripts -->
    <script src="/auth-script/load-sidenav.js"></script>

    <script>
        // ── Preloader ──
        window.addEventListener('load', function () {
            const preloader = document.getElementById('page-preloader');
            setTimeout(function () {
                preloader.classList.add('fade-out');
                setTimeout(function () { preloader.style.display = 'none'; }, 500);
            }, 400);
        });

        // ── Profit calc on amount input (kept from original) ──
        $(document).ready(function () {
            $('#amount').keyup(function () {
                var val = parseFloat($(this).val()) || 0;
                var profit = (val * 35 / 100).toFixed(2);
                var total  = (val + parseFloat(profit)).toFixed(2);
                $('#paymentAmount').html(val || '0.00');
                $('#totalProfit').html(profit);
                $('#total').html(total || '0.00');
            });
        });
    </script>
